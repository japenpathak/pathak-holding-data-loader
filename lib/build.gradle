//apply plugin: 'eclipse'

plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'eclipse'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing (includes compatible junit-platform dependencies transitively)
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10+'
    //testImplementation 'org.junit.platform:junit-platform-engine:1+'
    

    // This dependency is exported to consumers, that is to say found on their compile classpath.
    api 'org.apache.commons:commons-math3:3.6.1'
    
    implementation 'org.jsoup:jsoup:1.15.3'

    // This dependency is used internally, and not exposed to consumers on their own compile classpath.
    implementation 'com.google.guava:guava:31.1-jre'
    implementation 'org.apache.poi:poi:3.9'
    implementation 'org.apache.poi:poi-ooxml:4.0.0'
    implementation 'org.apache.commons:commons-csv:1.8' 
    implementation 'com.h2database:h2:1.4.200'
    
    // Spring dependencies
    implementation 'org.springframework:spring-core:5.3.23'
    implementation 'org.springframework:spring-context:5.3.23'
    implementation 'org.springframework:spring-jdbc:5.3.23'
    // YAML parsing
    // Spring Framework 5.3.x expects SnakeYAML 1.x (SnakeYAML 2.x removed some constructors used by Spring)
    implementation 'org.yaml:snakeyaml:1.33'
    // SLF4J logging
    implementation 'org.slf4j:slf4j-api:1.7.36'
    implementation 'ch.qos.logback:logback-classic:1.2.12'
    
    // JavaMail API for reading emails
    implementation 'com.sun.mail:javax.mail:1.6.2'
}

sourceSets {
    main {
        resources {
            srcDir 'src/main/resources'
        }
    }
}

tasks.named('processResources') {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()

    // Ensure tests don't interact with any real/file DB. Each test run gets an in-memory DB.
    // DB_CLOSE_DELAY=-1 keeps it alive for the JVM lifetime.
    systemProperty 'ph.dl.dbUrl', 'jdbc:h2:mem:phdl_test;DB_CLOSE_DELAY=-1'
}